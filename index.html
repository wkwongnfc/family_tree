<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的家族树互动游戏</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ================= 视觉样式 (CSS) ================= */
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; }
        body {
            /* 楷体字体族 */
            font-family: 'KaiTi', '楷体', 'STKaiti', '华文楷体', 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #E8F8F5; margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        
        /* 强制所有按钮和输入框继承页面的楷体字体 */
        button, input { font-family: inherit; }

        /* 顶部导航栏 */
        .nav-bar {
            background-color: #A9DFBF; padding: 10px; display: flex;
            justify-content: space-around; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 100;
            flex-wrap: wrap; gap: 5px;
        }
        .nav-btn {
            font-size: 18px; font-weight: bold; padding: 6px 14px;
            border: 3px solid white; border-radius: 20px; background-color: white;
            color: #27AE60; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 4px 0px #27AE60;
        }
        .nav-btn:active { transform: translateY(4px); box-shadow: none; }
        .nav-btn.active { background-color: #27AE60; color: white; border-color: #27AE60; }
        
        /* 背景音乐按钮的专属颜色 */
        .bgm-btn { margin-left: auto; background-color: #F1C40F; border-color: #F1C40F; color: white; box-shadow: 0 4px 0px #D4AC0D; }
        .bgm-btn.active { background-color: #E67E22; border-color: #E67E22; box-shadow: 0 4px 0px #D35400; }

        /* 页面容器 */
        .page { flex: 1; display: none; padding: 10px; overflow-y: auto; overflow-x: auto; text-align: center; position: relative; }
        .page.active { display: block; }
        h2 { color: #D35400; font-size: 24px; margin: 10px 0; text-shadow: 2px 2px 0px white;}

        /* --- 核心：树状图画布与网格 --- */
        .tree-canvas {
            position: relative; width: 100%; min-width: 1100px; min-height: 520px;
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        .tree-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* 行间距与组间距 */
        .tree-row { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 100px; z-index: 10; } 
        .tree-group { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 0 10px; min-height: 80px; }
        .tree-spacer { width: 50px; } 

        @keyframes popIn { 0% { transform: scale(0.1); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

        /* --- 横向大卡片样式 --- */
        .item-card {
            display: flex; flex-direction: row; align-items: center; justify-content: flex-start;
            width: 150px; height: 80px; padding: 10px; gap: 10px;
            background-color: white; border-radius: 20px; border: 4px solid #F39C12;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1); z-index: 10; font-size: 18px; font-weight: bold; color: #333; position: relative;
            transition: transform 0.3s ease;
        }
        
        /* 头像容器 */
        .emoji-pic { 
            width: 55px; height: 55px; pointer-events: none; display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .pic-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 50%; overflow: hidden; }
        .custom-img { width: 100%; height: 100%; object-fit: cover; border: 2px solid #EEE; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fallback-emoji { font-size: 45px; }

        /* 右侧文字与按钮容器 */
        .card-right { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 4px; }
        
        .play-btn {
            background-color: #E67E22; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer;
            box-shadow: 0 2px 0px #D35400; display: flex; align-items: center; justify-content: center; z-index: 20;
        }
        .play-btn:active { transform: translateY(2px); box-shadow: none; }

        /* --- 勾勾图标与已点击样式 --- */
        .check-mark {
            position: absolute; top: -10px; right: -10px; width: 28px; height: 28px;
            background-color: #2ECC71; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; font-weight: bold; border: 3px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2); opacity: 0; transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30;
        }
        .item-card.listened { border-color: #2ECC71; }
        .item-card.listened .check-mark { opacity: 1; transform: scale(1); }

        /* --- 闪卡翻转 --- */
        .flashcard { perspective: 1000px; width: 150px; height: 80px; z-index: 10; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1); border: 4px solid #F39C12; font-weight: bold;
        }
        .flashcard-front { background-color: #FEF9E7; }
        .flashcard-back { background-color: #E8F8F5; transform: rotateY(180deg); font-size: 22px; }

        /* --- 第3页字幕框 --- */
        .subtitle-box {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 15px;
            background-color: rgba(255, 255, 255, 0.95); border: 4px solid #2ECC71;
            color: #27AE60; padding: 15px 35px; border-radius: 30px;
            font-size: 28px; font-weight: bold; box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            white-space: nowrap; letter-spacing: 2px;
        }
        .subtitle-box.show { opacity: 1; }

        /* --- 第四页：自由画板 --- */
        #pg4.active { display: flex; flex-direction: column; }
        #pg4-workspace { display: flex; flex-direction: row; gap: 15px; flex: 1; width: 100%; margin-top: 10px; min-height: 0; position: relative; }
        #canvas-pg4-container {
            flex: 1; height: 100%; min-height: unset; background-color: #FAFAFA; border: 4px solid #2ECC71; border-radius: 20px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05); padding: 0; overflow: auto; position: relative;
        }
        #canvas-pg4 {
            width: 3000px; height: 3000px; background-image: radial-gradient(#BDC3C7 2px, transparent 2px);
            background-size: 30px 30px; position: relative; transform-origin: top left; transition: transform 0.2s ease-out;
        }
        .zoom-controls {
            position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid #E5E7EB;
        }
        .zoom-controls button {
            font-size: 16px; padding: 8px 12px; cursor: pointer; border: 2px solid #2ECC71; background: white; border-radius: 10px; 
            font-weight: bold; color: #27AE60; box-shadow: 0 3px 0 #2ECC71; transition: all 0.1s;
        }
        .zoom-controls button:active { transform: translateY(3px); box-shadow: none; }
        .zoom-controls .reset-btn { border-color: #E74C3C; color: #E74C3C; box-shadow: 0 3px 0 #E74C3C; margin-top: 5px; border-top: 2px dashed #CCC; padding-top: 10px; }
        .zoom-controls .save-btn { border-color: #3498DB; color: #3498DB; box-shadow: 0 3px 0 #3498DB; margin-top: 5px; }
        
        #pg4-drag-area {
            background-color: #FCF3CF; padding: 15px 5px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;
            width: 170px; border: 4px dashed #F1C40F; overflow-y: auto; flex-shrink: 0;
        }
        .draggable { touch-action: none; cursor: grab; z-index: 100; border-color: #3498DB; }

        #msg-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 15px 30px; border-radius: 20px; font-size: 24px; display: none; z-index: 9999; text-align: center; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #2ECC71; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><h2 style="color:#2ECC71; margin-top:20px;">正在加载游戏...</h2></div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="window.switchPage('pg1')">1. 概览图</button>
        <button class="nav-btn" onclick="window.switchPage('pg2')">2. 闪卡树</button>
        <button class="nav-btn" onclick="window.switchPage('pg3')">3. 树枝找</button>
        <button class="nav-btn" onclick="window.switchPage('pg4')">4. 拼建树</button>
        <!-- 新增的背景音乐按钮 -->
        <button class="nav-btn bgm-btn" onclick="window.toggleBGM()">🎵 音乐关</button>
    </div>

    <div id="pg1" class="page active"><h2>这是我的家族树</h2><div id="canvas-pg1" class="tree-canvas"></div></div>
    <div id="pg2" class="page"><h2>点一卡片，认字听音</h2><div id="canvas-pg2" class="tree-canvas"></div></div>
    <div id="pg3" class="page">
        <h2>依次点击卡片，召唤全家</h2>
        <div id="canvas-pg3" class="tree-canvas"></div>
    </div>

    <div id="pg4" class="page">
        <div class="cam-controls" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px;">
            <video id="video-element" autoplay playsinline style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid #E74C3C; object-fit: cover; background: #ddd;"></video>
            <button onclick="window.takePhoto()" style="font-size:16px; padding:6px 15px; border-radius:10px; border:none; background:#E74C3C; color:white; font-weight:bold; cursor:pointer; box-shadow: 0 4px 0px #C0392B;">📸 拍头像</button>
            <span style="color:#555; font-size:14px; font-weight:bold;">左侧拖入画板，靠近自动连线！</span>
        </div>
        <div id="pg4-workspace">
            <div id="pg4-drag-area"></div>
            <div id="canvas-pg4-container">
                <div id="canvas-pg4" class="tree-canvas"></div>
            </div>
            <div class="zoom-controls">
                <button onclick="window.zoomPg4(0.15)">➕ 放大</button>
                <button onclick="window.zoomPg4(-0.15)">➖ 缩小</button>
                <button class="reset-btn" onclick="window.resetPg4()">🔄 重设</button>
                <button class="save-btn" onclick="window.saveTreeImage()">💾 保存图片</button>
            </div>
        </div>
    </div>

    <div id="msg-box">提示信息</div>

    <script>
        // ================= 核心数据区 (硬编码 src 路径) =================
        const familyData = {
            "爷爷": { emoji: "👴", group: "patGP", generalImg: "img/爷爷.png", generalAudio: "audio/爷爷.mp3", pg3Img: "img_pg3/爷爷.png", pg3Audio: "audio_pg3/爷爷.mp3" }, 
            "奶奶": { emoji: "👵", group: "patGP", generalImg: "img/奶奶.png", generalAudio: "audio/奶奶.mp3", pg3Img: "img_pg3/奶奶.png", pg3Audio: "audio_pg3/奶奶.mp3" },
            "外公": { emoji: "👴", group: "matGP", generalImg: "img/外公.png", generalAudio: "audio/外公.mp3", pg3Img: "img_pg3/外公.png", pg3Audio: "audio_pg3/外公.mp3" }, 
            "外婆": { emoji: "👵", group: "matGP", generalImg: "img/外婆.png", generalAudio: "audio/外婆.mp3", pg3Img: "img_pg3/外婆.png", pg3Audio: "audio_pg3/外婆.mp3" },
            "伯伯": { emoji: "👨", group: "patAunts", generalImg: "img/伯伯.png", generalAudio: "audio/伯伯.mp3", pg3Img: "img_pg3/伯伯.png", pg3Audio: "audio_pg3/伯伯.mp3" }, 
            "叔叔": { emoji: "👨", group: "patAunts", generalImg: "img/叔叔.png", generalAudio: "audio/叔叔.mp3", pg3Img: "img_pg3/叔叔.png", pg3Audio: "audio_pg3/叔叔.mp3" }, 
            "姑姑": { emoji: "👩", group: "patAunts", generalImg: "img/姑姑.png", generalAudio: "audio/姑姑.mp3", pg3Img: "img_pg3/姑姑.png", pg3Audio: "audio_pg3/姑姑.mp3" },
            "爸爸": { emoji: "👨", group: "parents", generalImg: "img/爸爸.png", generalAudio: "audio/爸爸.mp3", pg3Img: "img_pg3/爸爸.png", pg3Audio: "audio_pg3/爸爸.mp3" }, 
            "妈妈": { emoji: "👩", group: "parents", generalImg: "img/妈妈.png", generalAudio: "audio/妈妈.mp3", pg3Img: "img_pg3/妈妈.png", pg3Audio: "audio_pg3/妈妈.mp3" },
            "舅舅": { emoji: "👨", group: "matAunts", generalImg: "img/舅舅.png", generalAudio: "audio/舅舅.mp3", pg3Img: "img_pg3/舅舅.png", pg3Audio: "audio_pg3/舅舅.mp3" }, 
            "阿姨": { emoji: "👩", group: "matAunts", generalImg: "img/阿姨.png", generalAudio: "audio/阿姨.mp3", pg3Img: "img_pg3/阿姨.png", pg3Audio: "audio_pg3/阿姨.mp3" },
            "哥哥": { emoji: "👦", group: "kids", generalImg: "img/哥哥.png", generalAudio: "audio/哥哥.mp3", pg3Img: "img_pg3/哥哥.png", pg3Audio: "audio_pg3/哥哥.mp3" }, 
            "姐姐": { emoji: "👧", group: "kids", generalImg: "img/姐姐.png", generalAudio: "audio/姐姐.mp3", pg3Img: "img_pg3/姐姐.png", pg3Audio: "audio_pg3/姐姐.mp3" }, 
            "我":   { emoji: "🧒", group: "kids", generalImg: "img/我.png",   generalAudio: "audio/我.mp3",   pg3Img: "img_pg3/我.png",   pg3Audio: "audio_pg3/我.mp3" },
            "弟弟": { emoji: "👶", group: "kids", generalImg: "img/弟弟.png", generalAudio: "audio/弟弟.mp3", pg3Img: "img_pg3/弟弟.png", pg3Audio: "audio_pg3/弟弟.mp3" }, 
            "妹妹": { emoji: "👧", group: "kids", generalImg: "img/妹妹.png", generalAudio: "audio/妹妹.mp3", pg3Img: "img_pg3/妹妹.png", pg3Audio: "audio_pg3/妹妹.mp3" }
        };

        const systemAudioData = {
            "sys_connect": { label: "连线成功音", defaultText: "连起来啦", audioPath: "audio_sys/sys_connect.mp3" },
            "sys_disconnect": { label: "断开连线音", defaultText: "断开了", audioPath: "audio_sys/sys_disconnect.mp3" },
            "sys_photo": { label: "拍照完成音", defaultText: "拍照成功", audioPath: "audio_sys/sys_photo.mp3" },
            "sys_save": { label: "保存图片提示", defaultText: "正在生成图片", audioPath: "audio_sys/sys_save.mp3" },
            "sys_error": { label: "超出边界声", defaultText: "咻", audioPath: "audio_sys/sys_error.mp3" },
            "sys_bgm": { label: "背景音乐", defaultText: "无", audioPath: "audio_sys/bgm.mp3" } // 新增背景音乐路径
        };

        const pg3Subtitles = {
            "爷爷": "爸爸的爸爸叫爷爷",
            "奶奶": "爸爸的妈妈叫奶奶",
            "伯伯": "爸爸的哥哥叫伯伯",
            "叔叔": "爸爸的弟弟叫叔叔",
            "姑姑": "爸爸的姐妹叫姑姑",
            "外公": "妈妈的爸爸叫外公",
            "外婆": "妈妈的妈妈叫外婆",
            "舅舅": "妈妈的兄弟叫舅舅",
            "阿姨": "妈妈的姐妹叫阿姨",
            "哥哥": "我的哥哥陪我玩",
            "姐姐": "我的姐姐笑容甜",
            "弟弟": "我的弟弟跑得快",
            "妹妹": "我的妹妹最可爱"
        };

        let pg4Links = []; let pg4Zoom = 1;
        window.pg3Clicked = new Set(); 
        window.subtitleTimeout = null;
        window.bgmAudio = null; // BGM 控制对象

        // ================= 背景音乐控制 =================
        window.toggleBGM = () => {
            let btn = document.querySelector('.bgm-btn');
            if (!window.bgmAudio) {
                window.bgmAudio = new Audio(systemAudioData['sys_bgm'].audioPath);
                window.bgmAudio.loop = true; // 循环播放
            }
            if (window.bgmAudio.paused) {
                window.bgmAudio.play().then(() => {
                    btn.innerText = "🎵 音乐开";
                    btn.classList.add('active');
                }).catch(e => {
                    window.showMsg("无法播放背景音乐，请检查 audio_sys/bgm.mp3 文件是否已上传。");
                });
            } else {
                window.bgmAudio.pause();
                btn.innerText = "🎵 音乐关";
                btn.classList.remove('active');
            }
        };

        // ================= 图像处理与渲染 =================
        function getPicHTML(word, pageId) {
            let info = familyData[word];
            let path = pageId === 'pg3' ? info.pg3Img : info.generalImg;
            if (path) {
                return `
                <div class="pic-wrapper">
                    <!-- 如果图片找不到 (onerror)，隐藏图片并显示旁边的 fallback-emoji -->
                    <img src="${path}" class="custom-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="fallback-emoji" style="display:none;">${info.emoji}</div>
                </div>`;
            }
            return `<div class="fallback-emoji">${info.emoji}</div>`;
        }

        function buildTreeLayout(pageId, mode) {
            const container = document.getElementById(`canvas-${pageId}`);
            if (mode === 'puzzle') {
                // 修复：必须增加 xmlns 命名空间，否则 html2canvas 渲染带 SVG 动态节点的画布会崩溃
                container.innerHTML = `<svg class="tree-svg" id="svg-${pageId}" xmlns="http://www.w3.org/2000/svg"></svg>`;
                let dragArea = document.getElementById('pg4-drag-area'); dragArea.innerHTML = '';
                
                const createDragHTML = (w) => `
                    <div class="item-card draggable" data-word="${w}" onpointerdown="window.startDrag(event)">
                        <div class="emoji-pic">${getPicHTML(w, pageId)}</div>
                        <div class="card-right"><div class="name-label">${w}</div></div>
                    </div>`;
                    
                dragArea.innerHTML += createDragHTML("我");
                for (let word in familyData) { if (word !== "我") dragArea.innerHTML += createDragHTML(word); }
                setTimeout(() => { let wrapper = document.getElementById('canvas-pg4-container'); if(wrapper) { wrapper.scrollLeft = 1500 - wrapper.clientWidth/2; wrapper.scrollTop = 1500 - wrapper.clientHeight/2; } }, 100);
                return; 
            }

            // 修复：同样为其他页面增加 xmlns 命名空间
            container.innerHTML = `
                <svg class="tree-svg" id="svg-${pageId}" xmlns="http://www.w3.org/2000/svg"></svg>
                <div class="tree-row generation-1"><div class="tree-group" id="${pageId}-patGP"></div><div class="tree-spacer"></div><div class="tree-group" id="${pageId}-matGP"></div></div>
                <div class="tree-row generation-2"><div class="tree-group" id="${pageId}-patAunts"></div><div class="tree-group" id="${pageId}-parents"></div><div class="tree-group" id="${pageId}-matAunts"></div></div>
                <div class="tree-row generation-3"><div class="tree-group" id="${pageId}-kids"></div></div>
            `;

            for (let word in familyData) {
                let info = familyData[word]; let groupEl = document.getElementById(`${pageId}-${info.group}`); 
                let picHTML = getPicHTML(word, pageId);
                let rightHTML = `<div class="card-right"><div class="name-label">${word}</div><button class="play-btn" onclick="window.playSound('${word}', event, 'person', '${pageId}')">🔊</button></div>`;

                if (mode === 'normal') {
                    groupEl.innerHTML += `<div class="item-card card" id="${pageId}-card-${word}"><div class="emoji-pic">${picHTML}</div>${rightHTML}</div>`;
                } else if (mode === 'flashcard') {
                    groupEl.innerHTML += `
                        <div class="flashcard card" id="${pageId}-card-${word}" onclick="this.classList.toggle('flipped')">
                            <div class="flashcard-inner">
                                <div class="flashcard-front"><div class="emoji-pic">${picHTML}</div><div class="name-label" style="font-size:24px;">?</div></div>
                                <div class="flashcard-back"><div class="name-label">${word}</div><button class="play-btn" onclick="window.playSound('${word}', event, 'person', '${pageId}')">🔊</button></div>
                            </div>
                        </div>`;
                } else if (mode === 'expandable') {
                    let isInitial = word === "我";
                    let subtitleNode = isInitial ? `<div id="pg3-subtitle" class="subtitle-box"></div>` : '';
                    groupEl.innerHTML += `
                        <div class="item-card card" id="${pageId}-card-${word}" onclick="window.handlePg3Click('${word}', '${pageId}', event)" style="${isInitial ? '' : 'display:none;'} cursor:pointer;">
                            <div class="check-mark">✓</div>
                            <div class="emoji-pic">${picHTML}</div>
                            ${rightHTML}
                            ${subtitleNode}
                        </div>`;
                }
            }
        }

        function refreshTrees() {
            buildTreeLayout('pg1', 'normal'); buildTreeLayout('pg2', 'flashcard'); buildTreeLayout('pg3', 'expandable'); buildTreeLayout('pg4', 'puzzle');
            setTimeout(() => { let activePage = document.querySelector('.page.active').id; if (activePage !== 'pg4') drawTreeLines(activePage); }, 150);
        }

        // ================= 操作与发音引擎 (含优雅降级 TTS) =================
        window.switchPage = (pageId) => {
            document.querySelectorAll('.page, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active'); 
            let targetBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(pageId));
            if(targetBtn) targetBtn.classList.add('active');
            setTimeout(() => { if(pageId === 'pg4') window.drawPg4Lines(); else drawTreeLines(pageId); }, 150);
        };

        window.playSound = (id, e = null, type = 'system', pageId = null) => {
            if (e) e.stopPropagation();
            let path = ''; let fallbackText = '';

            if (type === 'person') {
                path = (pageId === 'pg3') ? familyData[id].pg3Audio : familyData[id].generalAudio;
                fallbackText = id;
            } else {
                path = systemAudioData[id].audioPath;
                fallbackText = systemAudioData[id].defaultText;
            }

            if (path) {
                let audio = new Audio(path);
                // 自动处理路径错误（如找不到mp3文件），播放失败则立刻启用 AI 朗读备用
                audio.play().catch(err => { window.fallbackTTS(fallbackText); });
                return;
            }
            window.fallbackTTS(fallbackText);
        };

        window.fallbackTTS = (text) => {
            if ('speechSynthesis' in window) { let msg = new SpeechSynthesisUtterance(text); msg.lang = 'zh-CN'; msg.rate = 0.9; window.speechSynthesis.speak(msg); }
        };

        window.showMsg = (text) => {
            let box = document.getElementById('msg-box'); box.innerText = text; box.style.display = 'block'; setTimeout(() => box.style.display = 'none', 3000);
        };

        // ================= 第3页：顺序解锁点击逻辑 =================
        window.handlePg3Click = (word, pageId, event) => {
            if (event.target.classList.contains('play-btn')) return; // 点按钮只发音，不解锁
            let card = document.getElementById(`${pageId}-card-${word}`);
            if(!card || card.style.display === 'none') return;
            
            card.classList.add('listened');
            window.pg3Clicked.add(word);
            window.playSound(word, null, 'person', pageId);

            // 显示对应的字幕
            let subtitleText = pg3Subtitles[word];
            let subtitleBox = document.getElementById('pg3-subtitle');
            if (subtitleText && subtitleBox) {
                subtitleBox.innerText = subtitleText;
                subtitleBox.classList.add('show');
                clearTimeout(window.subtitleTimeout); // 保证快速连续点击时，3秒计时器重置
                window.subtitleTimeout = setTimeout(() => {
                    subtitleBox.classList.remove('show');
                }, 3000);
            }

            let toReveal = [];
            const hasAll = (arr) => arr.every(w => window.pg3Clicked.has(w));

            if (word === "我") toReveal.push("哥哥", "姐姐", "弟弟", "妹妹");
            if (hasAll(["哥哥", "姐姐", "弟弟", "妹妹"])) toReveal.push("爸爸", "妈妈");
            if (word === "爸爸") toReveal.push("伯伯", "叔叔", "姑姑");
            if (hasAll(["爸爸", "伯伯", "叔叔", "姑姑"])) toReveal.push("爷爷", "奶奶");
            if (word === "妈妈") toReveal.push("舅舅", "阿姨");
            if (hasAll(["妈妈", "舅舅", "阿姨"])) toReveal.push("外公", "外婆");

            toReveal.forEach(w => {
                let targetCard = document.getElementById(`${pageId}-card-${w}`);
                if(targetCard && targetCard.style.display === 'none') {
                    targetCard.style.display = 'flex';
                    targetCard.style.animation = 'popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                }
            });
            setTimeout(() => drawTreeLines(pageId), 100);
        };

        // ================= 核心：绘制优雅的家族树曲线 =================
        function drawTreeLines(pagePrefix) {
            const svg = document.getElementById(`svg-${pagePrefix}`); if(!svg) return; 
            let svgStr = ''; 
            
            const getRect = (el) => { 
                let rect = el.getBoundingClientRect(); let svgRect = svg.getBoundingClientRect(); 
                return { 
                    x: rect.left - svgRect.left + rect.width / 2, 
                    y: rect.top - svgRect.top + rect.height / 2, 
                    top: rect.top - svgRect.top, 
                    bottom: rect.bottom - svgRect.top 
                }; 
            };
            const getCard = (word) => { let card = document.getElementById(`${pagePrefix}-card-${word}`); return (card && card.style.display !== 'none') ? card : null; };
            
            const drawRel = (p1, p2, childList, color) => {
                let nP1 = getCard(p1); let nP2 = getCard(p2); let children = childList.map(getCard).filter(c=>c);
                if (!nP1 && !nP2) return;
                let rect1 = nP1 ? getRect(nP1) : null; let rect2 = nP2 ? getRect(nP2) : null;
                let midX, midY, parentBottom;

                if (rect1 && rect2) {
                    midX = (rect1.x + rect2.x) / 2; midY = (rect1.y + rect2.y) / 2; parentBottom = Math.max(rect1.bottom, rect2.bottom);
                    svgStr += `<path d="M ${rect1.x} ${rect1.y} L ${rect2.x} ${rect2.y}" stroke="${color}" stroke-width="2" stroke-dasharray="6,6" fill="none" />`;
                } else {
                    let rect = rect1 || rect2; midX = rect.x; midY = rect.y; parentBottom = rect.bottom;
                }
                if (children.length === 0) return;
                let childTop = Math.min(...children.map(c => getRect(c).top));
                let branchY = parentBottom + (childTop - parentBottom) / 2;
                children.forEach(cEl => {
                    let c = getRect(cEl);
                    svgStr += `<path d="M ${midX} ${midY} C ${midX} ${branchY}, ${c.x} ${branchY}, ${c.x} ${c.top}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round" />`;
                });
            };
            
            drawRel('爷爷', '奶奶', ['伯伯', '叔叔', '姑姑', '爸爸'], '#3498DB'); 
            drawRel('外公', '外婆', ['妈妈', '舅舅', '阿姨'], '#9B59B6');     
            drawRel('爸爸', '妈妈', ['哥哥', '姐姐', '我', '弟弟', '妹妹'], '#2ECC71'); 
            
            svg.innerHTML = svgStr;
        }

        // ================= 第4页特有逻辑 =================
        window.zoomPg4 = (delta) => { pg4Zoom += delta; pg4Zoom = Math.max(0.4, Math.min(pg4Zoom, 2)); document.getElementById('canvas-pg4').style.transform = `scale(${pg4Zoom})`; window.drawPg4Lines(); };
        window.getCardByWordPg4 = (word) => document.querySelector(`#canvas-pg4 [data-word="${word}"]`);
        
        window.getDistance = (el1, el2) => { 
            let x1 = parseFloat(el1.style.left || 0); let y1 = parseFloat(el1.style.top || 0);
            let x2 = parseFloat(el2.style.left || 0); let y2 = parseFloat(el2.style.top || 0);
            return Math.hypot(x1 - x2, y1 - y2); 
        };
        
        window.drawPg4Lines = (currDrag = null) => {
            const svg = document.getElementById('svg-pg4'); if(!svg) return; let svgStr = ''; 
            
            const getC = (el) => { return { x: parseFloat(el.style.left || 0) + 150 / 2, y: parseFloat(el.style.top || 0) + 80 / 2 }; };
            
            pg4Links.forEach(l => {
                let n1 = window.getCardByWordPg4(l.n1); let n2 = window.getCardByWordPg4(l.n2);
                if(n1 && n2) { let c1 = getC(n1); let c2 = getC(n2); svgStr += `<path d="M ${c1.x} ${c1.y} L ${c2.x} ${c2.y}" stroke="#2ECC71" stroke-width="3" stroke-linecap="round" />`; }
            });
            if (currDrag) {
                let cards = Array.from(document.getElementById('canvas-pg4').querySelectorAll('.draggable')).filter(c => c !== currDrag);
                let closest = null; let minD = Infinity;
                cards.forEach(c => { let d = window.getDistance(currDrag, c); if(d < minD) { minD = d; closest = c; } });
                
                if (closest && minD < 250 && !pg4Links.some(l => (l.n1 === currDrag.dataset.word && l.n2 === closest.dataset.word) || (l.n2 === currDrag.dataset.word && l.n1 === closest.dataset.word))) {
                    let c1 = getC(currDrag); let c2 = getC(closest);
                    svgStr += `<path d="M ${c1.x} ${c1.y} L ${c2.x} ${c2.y}" stroke="#F1C40F" stroke-width="3" stroke-dasharray="8,8" stroke-linecap="round" />`;
                }
            }
            svg.innerHTML = svgStr;
        };

        window.resetPg4 = () => {
            pg4Links = []; let canvas = document.getElementById('canvas-pg4'); let dragArea = document.getElementById('pg4-drag-area');
            Array.from(canvas.querySelectorAll('.draggable')).forEach(card => {
                card.style.position = 'relative'; card.style.left = 'auto'; card.style.top = 'auto'; card.style.transform = 'none'; dragArea.appendChild(card);
            });
            pg4Zoom = 1; canvas.style.transform = `scale(1)`;
            let wrapper = document.getElementById('canvas-pg4-container');
            if(wrapper) { wrapper.scrollLeft = 1500 - wrapper.clientWidth / 2; wrapper.scrollTop = 1500 - wrapper.clientHeight / 2; }
            window.drawPg4Lines(); window.playSound("sys_disconnect");
        };

        let currDrag = null, sX = 0, sY = 0;
        window.startDrag = (e) => {
            if (e.target.classList.contains('play-btn')) return;
            currDrag = e.currentTarget; let canvas = document.getElementById('canvas-pg4');
            if (currDrag.parentElement.id === 'pg4-drag-area') {
                let r = currDrag.getBoundingClientRect(); let cr = canvas.getBoundingClientRect();
                currDrag.style.position = 'absolute'; let lX = (r.left - cr.left)/pg4Zoom; let lY = (r.top - cr.top)/pg4Zoom;
                currDrag.style.left = lX+'px'; currDrag.style.top = lY+'px';
                canvas.appendChild(currDrag); currDrag.dataset.x = lX; currDrag.dataset.y = lY;
            } else { currDrag.dataset.x = parseFloat(currDrag.style.left||0); currDrag.dataset.y = parseFloat(currDrag.style.top||0); }
            currDrag.style.zIndex = 1000; currDrag.style.transform = "scale(1.05) rotate(5deg)";
            sX = e.clientX; sY = e.clientY; currDrag.setPointerCapture(e.pointerId);
            currDrag.addEventListener('pointermove', dragMove); currDrag.addEventListener('pointerup', endDrag);
        };
        const dragMove = (e) => {
            if(!currDrag) return; let dx = e.clientX - sX; let dy = e.clientY - sY;
            let zoom = currDrag.parentElement.id === 'canvas-pg4' ? pg4Zoom : 1;
            currDrag.dataset.x = parseFloat(currDrag.dataset.x) + dx/zoom; currDrag.dataset.y = parseFloat(currDrag.dataset.y) + dy/zoom;
            currDrag.style.left = currDrag.dataset.x + "px"; currDrag.style.top = currDrag.dataset.y + "px";
            sX = e.clientX; sY = e.clientY; window.drawPg4Lines(currDrag); 
        };
        const endDrag = (e) => {
            if(!currDrag) return; currDrag.removeEventListener('pointermove', dragMove); currDrag.removeEventListener('pointerup', endDrag); currDrag.releasePointerCapture(e.pointerId);
            currDrag.style.transform = "none"; currDrag.style.zIndex = 10;
            let dWord = currDrag.dataset.word; let cR = currDrag.getBoundingClientRect(); let pR = document.getElementById('canvas-pg4-container').getBoundingClientRect();
            if (cR.bottom < pR.top || cR.top > pR.bottom || cR.right < pR.left || cR.left > pR.right) {
                currDrag.style.position = 'relative'; currDrag.style.left = 'auto'; currDrag.style.top = 'auto';
                document.getElementById('pg4-drag-area').appendChild(currDrag);
                pg4Links = pg4Links.filter(l => l.n1 !== dWord && l.n2 !== dWord);
                window.drawPg4Lines(); window.playSound("sys_error"); currDrag = null; return;
            }
            let cards = Array.from(document.getElementById('canvas-pg4').querySelectorAll('.draggable')).filter(c => c !== currDrag);
            let cl = null; let minD = Infinity;
            cards.forEach(c => { let d = window.getDistance(currDrag, c); if(d < minD) { minD = d; cl = c; } });
            
            if (cl && minD < 250) {
                let tWord = cl.dataset.word;
                if (!pg4Links.some(l => (l.n1 === dWord && l.n2 === tWord) || (l.n1 === tWord && l.n2 === dWord))) {
                    pg4Links.push({n1: dWord, n2: tWord}); window.playSound("sys_connect"); 
                }
            }
            pg4Links = pg4Links.filter(l => {
                if(l.n1===dWord || l.n2===dWord){ 
                    let oCard = window.getCardByWordPg4(l.n1===dWord?l.n2:l.n1); 
                    if(oCard && window.getDistance(currDrag, oCard) < 350) return true; 
                    else{ window.playSound("sys_disconnect"); return false; } 
                }
                return true;
            });
            window.drawPg4Lines(); currDrag = null;
        };

        // 拍照保留，作为当前页面的临时头像展示（因为没有本地存储，刷新会消失）
        window.takePhoto = () => {
            let video = document.getElementById('video-element'); let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0);
            familyData["我"].generalImg = canvas.toDataURL('image/jpeg', 0.8);
            refreshTrees(); window.playSound("sys_photo");
        };

        window.saveTreeImage = () => {
            window.playSound("sys_save");
            let cArea = document.getElementById('canvas-pg4-container'); 
            
            // 修复带图片截图崩溃：为截图引擎配置了 useCORS 并允许 taint 处理
            html2canvas(cArea, { 
                backgroundColor: "#FAFAFA", 
                scale: 2, 
                useCORS: true, 
                allowTaint: true 
            }).then(canvas => {
                let link = document.createElement('a'); link.download = '我的家族树.png'; link.href = canvas.toDataURL('image/png');
                link.click(); window.showMsg("🖼️ 截屏成功，快去相册看看吧！");
            }).catch(err => {
                window.showMsg("截图失败: 图片资源未能成功加载或遇到了跨域限制。");
            });
        };

        async function initCamera() { try { document.getElementById('video-element').srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); } catch(err){} }

        // Start Boot
        document.getElementById('loader').style.display = 'none';
        refreshTrees(); initCamera();
        setTimeout(() => { drawTreeLines('pg1'); }, 300); // 确保第一页连线绘制

        window.addEventListener('resize', () => {
            let activePage = document.querySelector('.page.active').id;
            if(activePage === 'pg4') window.drawPg4Lines(); else drawTreeLines(activePage);
        });
    </script>
</body>
</html>
